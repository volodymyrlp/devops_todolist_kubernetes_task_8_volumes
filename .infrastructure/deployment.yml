apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapp
  namespace: todoapp
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: todoapp
  template:
    metadata:
      labels:
        app: todoapp
    spec:
      containers:
      - name: todoapp
        image: ikulyk404/todoapp:3.0.0
        resources:
          requests:
            memory: "256Mi"
            cpu: "150m"
          limits:
            memory: "256Mi"
            cpu: "150m"
        env:
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PYTHONUNBUFFERED
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: SECRET_KEY
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: todoapp-data
          mountPath: /app/data
        - name: app-config-volume
          mountPath: /app/configs
          readOnly: true
        - name: app-secret-volume
          mountPath: /app/secrets
          readOnly: true
        livenessProbe:
          httpGet:
            path: api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: api/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: todoapp-data
        persistentVolumeClaim:
          claimName: todoapp-pvc
      - name: app-config-volume
        configMap:
          name: app-config
          items:
          - key: PYTHONUNBUFFERED
            path: PYTHONUNBUFFERED
      - name: app-secret-volume
        secret:
          secretName: app-secret
          items:
          - key: SECRET_KEY
            path: SECRET_KEY
